<div *ngIf="cv$ | async as cv" class="row">
    <div class="col-12 col-md-3 bg-black text-light">
        <div class="container text-right p-3">
            <p class="d-none d-md-block text-right h4">
                {{ cv.ui.knowledgeLeftHeading }}<i class="fas fa-star ml-2"></i>
            </p>
            <p class="d-md-none text-center h5">{{ cv.ui.knowledgeLeftHeading }}</p>
        </div>
    </div>
    <div class="col-12 col-md-9 bg-light p-3">
        <div class="container">
            <ng-container *ngFor="let section of cv.knowledge.sections; let idx = index">
                <hr *ngIf="idx > 0" class="my-3" />
                <p class="h3 text-muted" [class.mt-4]="idx > 0">{{ section.heading }}</p>
                <p>{{ section.body }}</p>
            </ng-container>
        </div>
    </div>
    <hr>
</div>
